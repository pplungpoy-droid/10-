<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Favorite</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="container py-4">

    <!-- Profile -->

    <div class="card shadow-sm p-4 mb-5 profile-card">
        <div class="row align-items-center">

            <div class="col-md-2 text-center">
                <img src="img/profile.jpg" class="profile">
            </div>

            <div class="col-md-10">
                <h3 class="name">เจ้าพายุ ลุงปอย</h3>
                <p>ชื่อเล่น: พี</p>
                <p>ยินดีต้อนรับสู่เว็บไซต์แนะนำสิ่งที่ชื่นชอบของฉัน</p>
            </div>

        </div>
    </div>

    <h4 class="mb-3">🎬 My Top 5 Favorite Anime</h4>

    <div class="row g-4">

        <div class="col-lg-2 col-md-4">
            <div class="card h-100 anime-card">
                <img src="img/anime1.jpg">
                <div class="card-body">
                    <h6>The Apothecary Diaries</h6>
                    <small>เรื่องที่ชอบที่สุด</small>
                </div>
            </div>
        </div>

        <div class="col-lg-2 col-md-4">
            <div class="card h-100 anime-card">
                <img src="img/anime2.jpg">
                <div class="card-body">
                    <h6>Kaiju No.8</h6>
                </div>
            </div>
        </div>

        <div class="col-lg-2 col-md-4">
            <div class="card h-100 anime-card">
                <img src="img/anime3.jpg">
                <div class="card-body">
                    <h6>Alya Sometimes...</h6>
                </div>
            </div>
        </div>

        <div class="col-lg-2 col-md-4">
            <div class="card h-100 anime-card">
                <img src="img/anime4.jpg">
                <div class="card-body">
                    <h6>Kamisama...</h6>
                </div>
            </div>
        </div>

        <div class="col-lg-2 col-md-4">
            <div class="card h-100 anime-card">
                <img src="img/anime5.jpg">
                <div class="card-body">
                    <h6>Yamada-kun</h6>
                </div>
            </div>
        </div>

    </div>

    <!-- Song -->

    <h4 class="mt-5 mb-3">🎵 My Top 5 Favorite Song</h4>

    <div class="song-card">

        <iframe width="100%" height="315"
        src="https://youtu.be/sY-On3f-WfA?si=oN7HfbSbsbVWvoaF"
        allowfullscreen></iframe>

        <div class="song-text">
            <h6>สนิทใจ - PALMY (เพลงจากละครรักร้าย)「Official MV」</h6>
        </div>

    </div>

      <div class="song-card">

        <iframe
    width="100%"
    height="315"
    src="https://youtu.be/uOoDAiimVQA?si=fv5wSbwp1DMG8z2K"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
</iframe>

        <div class="song-text">
            <h6>แค่บางคำ</h6>
        </div>

    </div>

</div>

</body>
</html>
